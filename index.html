<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connecticut Parks Explorer</title>
  <meta name="description" content="Interactive map of every state, national, and town park in Connecticut.">
  <link rel="icon" href="icons/state.svg">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <header>
    <div>
      <h1 id="siteTitle">Connecticut Parks Explorer</h1>
      <span class="tagline" id="tagline"></span>
    </div>
    <div class="controls">
      <input id="search" type="search" placeholder="Search parks or towns…" autocomplete="off">
      <div class="chips">
        <button class="chip active" data-type="state"><span class="dot"></span>State</button>
        <button class="chip active" data-type="national"><span class="dot"></span>National</button>
        <button class="chip active" data-type="town"><span class="dot"></span>Town</button>
      </div>
      <button id="listToggle">List</button>
    </div>
  </header>

  <main>
    <div id="map"></div>
    <aside id="listPanel">
      <div id="listMeta">Loading…</div>
      <div id="parkList"></div>
    </aside>
    <div id="status"></div>
    <div id="credit">Data: CT DEEP · National Park Service · OpenStreetMap contributors</div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
          integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
